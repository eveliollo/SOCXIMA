<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOCXIMA P2P • Real v1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/socket.io-client@4.8.1/dist/socket.io.min.js"></script>
  <script src="https://unpkg.com/@solana/web3.js@latest/dist/index.browser.js"></script>
  <style>
    body { background: linear-gradient(160deg, #05070C 0%, #0A0E17 100%); font-family: 'Rajdhani', sans-serif; }
    .glow { filter: drop-shadow(0 0 8px rgba(240, 180, 41, 0.3)); }
    ::-webkit-scrollbar {width: 6px;}
    ::-webkit-scrollbar-track {background: #121826;}
    ::-webkit-scrollbar-thumb {background: #232D42; border-radius: 3px;}
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: { extend: { colors: {deeper:'#05070C',panel:'#121826',panel2:'#1A2233',border:'#232D42',gold:'#F0B429',green:'#00E676',solana:'#14F195'} } }
    }
  </script>
</head>
<body class="text-gray-200 min-h-screen">
  <div id="app" class="container mx-auto px-3 py-5">
    <header class="text-center mb-6">
      <h1 class="text-gold text-[clamp(2rem,5vw,3.5rem)] font-bold tracking-wider glow">SOCXIMA</h1>
      <p class="text-gray-500 uppercase text-xs md:text-sm tracking-[0.3em] -mt-1">P2P Exchange • Blockchain Solana</p>
    </header>

    <section id="loginView" class="max-w-sm mx-auto mt-20">
      <div class="bg-panel rounded-2xl border border-border p-8 shadow-2xl">
        <h2 class="text-xl font-semibold text-center mb-6">🔐 Acceso Seguro</h2>
        <button id="btnConnectWallet" class="w-full bg-gradient-to-r from-solana to-green hover:from-green hover:to-solana text-black font-bold py-3.5 rounded-lg transition-all">🟣 Conectar con Phantom</button>
      </div>
    </section>

    <section id="mainView" class="hidden">
      <div class="flex justify-center gap-4 mb-6">
        <button class="tab-btn active border-b-2 border-gold text-gold px-4 py-2 font-bold" data-target="marketTab">📊 Mercado</button>
        <button class="tab-btn border-b-2 border-transparent hover:border-gray-600 px-4 py-2 font-bold" data-target="createTab">➕ Crear Sala</button>
        <button class="tab-btn border-b-2 border-transparent hover:border-gray-600 px-4 py-2 font-bold" data-target="roomTab">💬 Sala Actual</button>
      </div>

      <div id="marketTab" class="tab-content">
        <div class="bg-panel rounded-xl border border-border p-5 max-w-3xl mx-auto">
          <h3 class="text-gold font-bold text-lg mb-4">🌐 Salas Disponibles</h3>
          <div id="marketList" class="space-y-2 max-h-[400px] overflow-y-auto"><p class="text-gray-500 text-center py-4">Cargando...</p></div>
        </div>
      </div>

      <div id="createTab" class="tab-content hidden">
        <div class="bg-panel rounded-xl border border-border p-5 max-w-md mx-auto">
          <h3 class="text-gold font-bold text-lg mb-4">➕ Nueva Operación P2P</h3>
          <div class="space-y-3">
            <div><label class="text-sm text-gray-400">Nombre</label><input id="roomName" type="text" class="w-full bg-panel2 border border-border rounded p-2.5 mt-1"></div>
            <div><label class="text-sm text-gray-400">Activo / Monto</label><div class="flex gap-2"><input id="roomAsset" class="w-1/2 bg-panel2 border border-border rounded p-2.5"><input id="roomAmount" type="number" class="w-1/2 bg-panel2 border border-border rounded p-2.5"></div></div>
            <div><label class="text-sm text-gray-400">Contraseña</label><input id="roomPass" type="password" class="w-full bg-panel2 border border-border rounded p-2.5 mt-1"></div>
            <button id="btnCreateRoom" class="w-full bg-green hover:bg-green/90 text-black font-bold py-2.5 rounded-lg mt-2">Crear Sala Privada</button>
          </div>
        </div>
      </div>

      <div id="roomTab" class="tab-content hidden">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 max-w-5xl mx-auto">
          <div class="md:col-span-2 bg-panel rounded-xl border border-border h-[650px] flex flex-col shadow-lg">
            <div class="p-4 border-b border-border text-gold font-bold text-lg flex justify-between"><span>💬 Chat Privado</span><span id="roomIdBadge" class="text-xs bg-panel2 px-2 rounded">-</span></div>
            <div id="chatContainer" class="flex-1 p-4 overflow-y-auto text-sm space-y-2 bg-panel2/30"></div>
            <div class="p-4 border-t border-border flex gap-2"><input id="messageInput" type="text" class="flex-1 bg-panel2 border border-border rounded-md p-2.5"><button id="sendMessageBtn" class="bg-green hover:bg-green/90 text-black px-4 rounded-md font-semibold">Enviar</button></div>
          </div>
          <div class="bg-panel rounded-xl border border-border h-[650px] flex flex-col shadow-lg">
            <div class="p-4 border-b border-border text-gold font-bold text-lg text-center">📹 Videollamada</div>
            <video id="localVideo" autoplay muted playsinline class="w-full h-1/2 object-cover border-b border-border bg-black/50"></video>
            <video id="remoteVideo" autoplay playsinline class="w-full h-1/2 object-cover bg-black/50"></video>
          </div>
        </div>
      </div>
    </section>

    <div id="joinModal" class="fixed inset-0 bg-black/80 items-center justify-center hidden z-50">
      <div class="bg-panel rounded-xl border border-border p-6 w-full max-w-sm">
        <h3 class="text-gold font-bold mb-3">🔑 Unirse a Sala</h3>
        <p class="text-sm text-gray-400 mb-2">ID: <span id="joinRoomId"></span></p>
        <input id="joinPassInput" type="password" class="w-full bg-panel2 border border-border rounded p-2.5 mb-3">
        <div class="flex gap-2"><button id="btnCancelJoin" class="flex-1 bg-gray-700 hover:bg-gray-600 rounded p-2">Cancelar</button><button id="btnConfirmJoin" class="flex-1 bg-green text-black font-bold rounded p-2">Entrar</button></div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
